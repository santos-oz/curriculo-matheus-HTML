<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        body{
            padding:50px 50px;
        }

        /*é o (ponto) + nome da class*/
        .box1{
            display: flex;
            flex-direction: column;
            justify-content:space-evenly;
            align-items: center;
            background-color: blue;
            width: 800px;
            height: 400px;

        }

        #titulo-principal { /*estilizar o (id- item identificador)*/
            color: beige;
        }

        ul{
            display: flex;
            gap:30px;
        }
        
        ul li {
           list-style: none;
           font-size: 1.5rem; /*Usamos 1.5rem  por conta da responsividade; equivale a 24px*/
        }

        a{
            color: #969696;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif ;
            text-decoration: none;
        }

        a:hover{ /* ():hover) seletor quando o mouse estiver sobre o elemento*/ 
            color: brown;
            text-decoration:underline ;
            font-weight:700 ;
        }

    </style>
</head>

<body>
    <div class="box1">

        <h1 id="titulo-principal">Flexbox</h1>
        <h1 id="titulo-principal">Flexbox2</h1>
        <h1 id="titulo-principal">Flexbox3</h1>
        <h1 id="titulo-principal">Flexbox4</h1>
        
    </div>

    <nav>
        <ul>
           <li><a href="#">Home</a></li> 
           <li><a href="#">Sobre</a></li> 
           <li><a href="#">Serviços</a></li> 
           <li><a href="#">Contato</a></li> 
        </ul>
    </nav>
    

</body>

</html>
